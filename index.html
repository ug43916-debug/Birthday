<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        overflow: hidden;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        text-align: center;
        color: white;
    }

    h1 {
        margin-top: 20%;
        font-size: 3em;
        animation: glow 2s infinite alternate;
    }

    p {
        font-size: 1.3em;
        margin: 20px;
    }

    button {
        padding: 12px 25px;
        font-size: 1em;
        border: none;
        border-radius: 20px;
        background: white;
        color: #ff4d6d;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4d6d;
        color: white;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px white; }
        to { text-shadow: 0 0 20px #ff4d6d; }
    }

    .heart, .star {
        position: absolute;
        width: 20px;
        height: 20px;
        background: red;
        transform: rotate(45deg);
        animation: float 6s infinite;
    }

    .heart::before,
    .heart::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        background: red;
        border-radius: 50%;
    }

    .heart::before { top: -10px; left: 0; }
    .heart::after { left: -10px; top: 0; }

    .star {
        background: yellow;
        clip-path: polygon(
            50% 0%, 61% 35%, 98% 35%,
            68% 57%, 79% 91%,
            50% 70%, 21% 91%,
            32% 57%, 2% 35%, 39% 35%
        );
        transform: rotate(0deg);
    }

    @keyframes float {
        0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
        100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }
</style>
</head>

<body>

<h1>🎉 Happy Birthday My Love 🎉</h1>

<p id="message">
    To my cutest <b>Otteruu 🦦</b>, my lovely <b>Vrinduu 💕</b>,  
    and my playful <b>Bandaruu 🐒</b> —  
    you make my life magical every single day ✨
</p>

<button onclick="nextMessage()">Click for Surprise 💖</button>

<script>
    const messages = [
        "You are my happiness, my peace, my everything ❤️",
        "Every moment with you feels like a dream ✨",
        "I promise to love you more with each passing day 💕",
        "Once again... Happy Birthday my jaan 🎂💖"
    ];

    let index = 0;

    function nextMessage() {
        document.getElementById("message").innerHTML = messages[index];
        index = (index + 1) % messages.length;
    }

    function createElement(type) {
        const el = document.createElement("div");
        el.className = type;
        el.style.left = Math.random() * window.innerWidth + "px";
        el.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(el);

        setTimeout(() => el.remove(), 6000);
    }

    setInterval(() => createElement("heart"), 300);
    setInterval(() => createElement("star"), 500);
</script>

</body>
</html>
